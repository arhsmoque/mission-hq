name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: npm ci

      - run: npm run build

      - name: Check for conflict markers
        run: |
          if git grep -n '<<<<<<<' -- '*.ts' '*.tsx' '*.js' '*.mjs' '*.json' '*.md' '*.yml' '*.yaml' '*.ahk'; then
            echo "Found merge conflict markers"
            exit 1
          fi
